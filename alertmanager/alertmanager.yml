global:
  resolve_timeout: 5m

# Default routing tree for incoming alerts
route:
  receiver: 'telegram'
  group_by: ['alertname', 'instance']
  group_wait: 5s         # Wait 5s before buffering initial alerts
  group_interval: 10s     # Wait 10s before sending batch updates
  repeat_interval: 12h    # Resend firing alerts every 12h if not resolved

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: 'YOUR_TELEGRAM_BOT_TOKEN_HERE'
        chat_id: YOUR_CHAT_ID_HERE
        parse_mode: 'HTML'
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🚨 <b>ALERT FIRING</b> 🚨{{ else }}✅ <b>ALERT RESOLVED</b> ✅{{ end }}

          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}
          <b>Severity:</b> <code>{{ .Labels.severity }}</code>
          <b>Instance:</b> <code>{{ .Labels.instance }}</code>

          <b>Details:</b>
          {{ .Annotations.description }}
          {{ end }}